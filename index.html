<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e9eaeb; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
    .card { background: #181a20; border-radius: 12px; padding: 20px; width: 95%; max-width: 900px; border: 1px solid #2b2f36; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    
    /* Video Streaming Section */
    .video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 2px solid #2b2f36; position: relative; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .stream-overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #f0b90b; border: 1px solid #f0b90b; }

    h2 { color: #f0b90b; margin: 0 0 15px 0; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-box { background: #2b2f36; padding: 12px; border-radius: 8px; text-align: center; }
    .label { font-size: 10px; color: #848e9c; text-transform: uppercase; margin-bottom: 4px; }
    .value { font-size: 16px; font-weight: bold; color: #4A86E8; }

    .chart-container { height: 200px; margin-bottom: 20px; }
    
    .btn-init { width: 100%; background: #f0b90b; color: #181a20; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    #msg { font-size: 12px; text-align: center; margin-top: 8px; color: #848e9c; }
  </style>
</head>
<body>

  <div class="card">
    <h2>BeamVR Live <span class="stream-overlay">4K STREAM | PORT 45517</span></h2>
    
    <!-- Video Stream Window -->
    <div class="video-container">
      <video id="remoteVideo" autoplay playsinline muted poster="https://via.placeholder.com..."></video>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div class="label">Latency</div><div id="lat-val" class="value">-- ms</div></div>
      <div class="stat-box"><div class="label">Bitrate</div><div id="bit-val" class="value">-- kbps</div></div>
      <div class="stat-box"><div class="label">Status</div><div class="value" style="color:#2ebd85">STREAMING</div></div>
    </div>

    <div class="chart-container">
      <canvas id="latencyChart"></canvas>
    </div>

    <button id="initBtn" class="btn-init" onclick="runInit()">INITIALIZE SESSION</button>
    <div id="msg">Linked to Sheet: 1nJoL...MJW8</div>
  </div>

  <script>
    let chart;
    const video = document.getElementById('remoteVideo');

    // 1. Initialize Performance Chart
    function initChart() {
      const ctx = document.getElementById('latencyChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Latency', data: [], borderColor: '#f0b90b', tension: 0.4, fill: false }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#2b2f36' } } }, plugins: { legend: { display: false } } }
      });
    }

    // 2. Video Socket Connection (2026 Tech)
    function connectVideoStream() {
      // Connect to the Shadow PC WebSocket Relay
      const ws = new WebSocket('ws://localhost:45517'); // Relay script required on local machine
      ws.binaryType = 'arraybuffer';
      
      const mediaSource = new MediaSource();
      video.src = URL.createObjectURL(mediaSource);

      mediaSource.addEventListener('sourceopen', () => {
        const sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E"');
        ws.onmessage = (e) => {
          if (!sourceBuffer.updating) sourceBuffer.appendBuffer(e.data);
        };
      });
    }

    // 3. Telemetry Sync (Google Sheets)
    function refreshData() {
      google.script.run.withSuccessHandler(data => {
        if (data && data.length > 0) {
          const latest = data[data.length - 1];
          document.getElementById('lat-val').innerText = latest.latency + " ms";
          document.getElementById('bit-val').innerText = latest.bitrate + " kbps";
          chart.data.labels = data.map(d => d.time);
          chart.data.datasets[0].data = data.map(d => d.latency);
          chart.update('none');
        }
      }).getLatestLogs();
    }

    function runInit() {
      google.script.run.withSuccessHandler(() => {
        document.getElementById('msg').innerHTML = "✅ Session Logged.";
      }).setupSheet();
    }

    window.onload = () => {
      initChart();
      setInterval(refreshData, 5000);
      // connectVideoStream(); // Uncomment when WebSocket relay is live
    };
  </script>
</body>
</html>
